# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

tasks:
  install:
    desc: Installs and configure GIT
    summary: git, as a tool, is already installed via brew.
    cmds:
      - task: setup:git

  setup:git:
    internal: true
    cmds:
      - cmd: |
          # If there is no user.email, we'll assume it's a new machine/setup and ask it
          if [ -z "$(git config --global --get user.email)" ]; then
            user ' - What is your git author name?'
            read -r user_name
            user ' - What is your git author email?'
            read -r user_email

            git config --global user.name "$user_name"
            git config --global user.email "$user_email"
          elif [ "$(git config --global --get dotfiles.managed)" != "true" ]; then
            # If user.email exists, let's check for dotfiles.managed config. If it is
            # not true, we'll backup the gitconfig file and set previous user.email and
            # user.name in the new one
            user_name="$(git config --global --get user.name)"
            user_email="$(git config --global --get user.email)"
            mv ~/.gitconfig ~/.gitconfig.backup
            echo "moved ~/.gitconfig to ~/.gitconfig.backup"
            git config --global user.name "$user_name"
            git config --global user.email "$user_email"
          else
            # otherwise this gitconfig was already made by the dotfiles
            echo "already managed by dotfiles"
          fi
          # include the gitconfig.local file
          git config --global include.path ~/.gitconfig.local
          # finally make git know this is a managed config already, preventing later
          # overrides by this script
          git config --global dotfiles.managed true
          git config --global dotfiles.lastupdate "$(date +%Y%m%d%H%M)"

      # Don't ask ssh password all the time
      - cmd: git config --global credential.helper osxkeychain
        platforms: [darwin]
      - cmd: git config --global credential.helper cache
        platforms: [linux]

      # A syntax-highlighting pager for git, diff, grep, and blame output
      - cmd: git config --global core.pager "delta --dark"

      # A structural diff tool that understands syntax
      - cmd: git config --global diff.tool "difftastic"

