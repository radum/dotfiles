# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

includes:
  brew:
    internal: true
    taskfile: ./brew.yml

tasks:
  install:
    desc: Install all system dependencies
    summary: |
      Install all system dependencies

