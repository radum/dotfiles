# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

tasks:
  install:
    desc: Installs mise
    summary: mise-en-place, as a tool, is already installed via brew.
    cmds:
      - task: install:mise

  install:mise:
    internal: true
    status:
      - which mise
    cmds:
      - cmd: brew install mise
        platforms: [darwin]
      - cmd: |
          # https://mise.jdx.dev/installing-mise.html#apt
          if dpkg --compare-versions "$VERSION_ID" lt "26.04"; then
            echo "Ubuntu version is lower than 26.04 - mise using apt repository installation method"
            sudo apt update -y && sudo apt install -y curl
            sudo install -dm 755 /etc/apt/keyrings
            curl -fSs https://mise.jdx.dev/gpg-key.pub | sudo tee /etc/apt/keyrings/mise-archive-keyring.asc 1> /dev/null
            echo "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.asc] https://mise.jdx.dev/deb stable main" | sudo tee /etc/apt/sources.list.d/mise.list
            sudo apt update -y
            sudo apt install -y mise
          else
            echo "Ubuntu version is 26.04 or higher - mise using PPA installation method"
            sudo add-apt-repository -y ppa:jdxcode/mise
            sudo apt update -y
            sudo apt install -y mise
          fi
        platforms: [linux]

  install:tools:
    desc: Run mise install to install all tools defined in mise toml file
    cmds:
      - cmd: mise install

  update:
    aliases:
      - up
    desc: Updates all mise based tools to the latest versions
    cmds:
      - cmd: mise upgrade
        silent: true

  outdated:
    desc: List all outdated tools, including major bumps
    cmds:
      - cmd: mise outdated -l
        silent: true
