# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

tasks:
  install:
    desc: Installs all mise based tools
    summary: mise-en-place, as a tool, is already installed via brew.
    cmds:
      - task: install:mise
      - task: install:tools

  install:mise:
    internal: true
    status:
      - which mise
    cmds:
      - cmd: brew install mise
        platforms: [darwin]
      - cmd: |
          sudo add-apt-repository -y ppa:jdxcode/mise
          sudo apt update -y
          sudo apt install -y mise
        platforms: [linux]

  install:tools:
    desc: Run mise install to install all tools defined in mise toml file
    cmds:
      - cmd: mise install

  update:
    aliases:
      - up
    desc: Updates all mise based tools
    cmds:
      - cmd: mise up
        silent: true

  outdated:
    desc: List all outdated tools, including major bumps
    cmds:
      - cmd: mise outdated -l
        silent: true
