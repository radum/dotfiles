# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

tasks:
  install:
    desc: Install shell tools, configurations and plugins
    summary: |
      Install shell tools, configurations and plugins

      This task will install and configure shell tools (starship, zoxide, etc.), including setting up `prezto`, `zinit` and any custom plugins or themes for zsh.

      Symlinks for zsh configuration files are handled in the `dotfiles` task, so this task focuses on installing and configuring zsh itself and its plugins.
    cmds:
      - task: starship:install
      - task: atuin:install
      - task: fzf:install # [FZF-TV] Trying television for a while so FZF might be removed in the future.
      - task: zoxide:install
      - task: jujutsu:install
      - task: zellij:install
      - task: prezto:install
      - task: zephyr:install
      - task: zinit:install

  starship:install:
    internal: true
    desc: Install Starship, a cross-shell prompt
    summary: |
      Install Starship, a cross-shell prompt, using the official installation script.
    status:
      - which starship
    cmds:
      - curl -sS https://starship.rs/install.sh | sh
    platforms: [linux] # Starship on macOS is installed via Homebrew.

  atuin:install:
    internal: true
    desc: Install Atuin, a next-generation shell history manager
    summary: |
      Sync, search and backup shell history with Atuin.
    status:
      - which atuin
    cmds:
      - curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
    platforms: [linux] # atuin on macOS is installed via Homebrew.

  fzf:install:
    internal: true
    desc: Install fzf, a command-line fuzzy finder
    summary: |
      Install fzf, a command-line fuzzy finder, using the official installation script.
    status:
      - which fzf
    cmds:
      - mise use -g fzf@latest
    platforms: [linux] # fzf on macOS is installed via Homebrew.

  zoxide:install:
    internal: true
    desc: Install zoxide, a smarter cd command
    summary: |
      Install zoxide, a smarter cd command, using the official installation script.
    status:
      - which zoxide
    cmds:
      - curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
    platforms: [linux] # zoxide on macOS is installed via Homebrew.

  jujutsu:install:
    internal: true
    desc: Install Jujutsu
    summary: |
      Jujutsu—a version control system
    status:
      - which jj
    cmds:
      - mise exec cargo -- cargo binstall --strategies crate-meta-data jj-cli

  zellij:install:
    internal: true
    desc: Install Zellij
    summary: |
      Zellij—a terminal multiplexer
    status:
      - which zellij
    cmds:
      - mise exec cargo -- cargo binstall zellij

  prezto:install:
    internal: true
    desc: Install prezto, a configuration framework for zsh
    summary: |
      Install prezto and let it use $HOME as the zdotdir. Also the `.zpreztorc` will be symlinked in the `dotfiles` task,
      so no need to worry about that here. The location will be `${ZDOTDIR:-$HOME}/.zprezto`.
    status:
      - test -d "${ZDOTDIR:-$HOME}/.zprezto"
    cmds:
      - cmd: |
          if [ ! -d "${ZDOTDIR:-$HOME}/.zprezto" ]; then
            git clone --recursive https://github.com/sorin-ionescu/prezto.git "${ZDOTDIR:-$HOME}/.zprezto"
          fi

  prezto:update:
    internal: true
    desc: Update prezto to the latest version
    summary: |
      Update prezto to the latest version by pulling the latest changes from the repository.
    cmds:
      - cmd: |
          if [ -d "${ZDOTDIR:-$HOME}/.zprezto" ]; then
            git -C "${ZDOTDIR:-$HOME}/.zprezto" pull --rebase
          fi

  zephyr:install:
    internal: true
    desc: Install Zephyr, a Zsh framework as nice as a cool summer breeze
    summary: |
      Install zephyr, Zephyr combines some of the best parts from Prezto and other Zsh frameworks, removes bloat and dependencies, and prioritizes speed and simplicity.
    status:
      - test -d "${ZDOTDIR:-$HOME}/.zephyr"
    cmds:
      - cmd: |
          [[ -d ${ZDOTDIR:-~}/.zephyr ]] ||
            git clone --depth=1 https://github.com/mattmc3/zephyr ${ZDOTDIR:-~}/.zephyr

  zephyr:update:
    internal: true
    desc: Update zephyr to the latest version
    summary: |
      Update zephyr to the latest version by pulling the latest changes from the repository.
    cmds:
      - cmd: |
          if [ -d "${ZDOTDIR:-$HOME}/.zephyr" ]; then
            git -C "${ZDOTDIR:-$HOME}/.zephyr" pull --rebase
          fi

  zinit:install:
    internal: true
    desc: Install zinit, a zsh plugin manager
    summary: |
      Install zinit, a zsh plugin manager, by cloning the repository to the appropriate location.
    status:
      - test -d "${XDG_DATA_HOME:-${HOME}/.local/share}/zinit/zinit.git"
    cmds:
      - cmd: |
          ZINIT_HOME="${XDG_DATA_HOME:-${HOME}/.local/share}/zinit/zinit.git"
          [ ! -d $ZINIT_HOME ] && mkdir -p "$(dirname $ZINIT_HOME)"
          [ ! -d $ZINIT_HOME/.git ] && git clone https://github.com/zdharma-continuum/zinit.git "$ZINIT_HOME"

  zinit:update:
    internal: true
    desc: Update zinit, and all zinit plugins, to the latest version
    summary: |
      Update zinit to the latest version by pulling the latest changes from the repository. Also update all zinit plugins by running `zinit update` command.
    cmds:
      - cmd: |
          # Self update
          zinit self-update
          # Plugin update
          zinit update

